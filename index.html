<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful To-Do App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="login-screen" class="app-container">
        <div class="login-content">
            <div class="logo-circle"><i class="fas fa-check-double"></i></div>
            <h1>Halo!</h1>
            <p>Siap mengatur harimu dengan ceria?</p>
            <input type="text" id="username" placeholder="Masukkan nama kamu...">
            <button onclick="handleLogin()">Mulai Sekarang</button>
        </div>
    </div>

    <div id="dashboard-screen" class="app-container hidden">
        <header class="main-header">
            <div class="header-text">
                <h2 id="welcome-user">Halo, User!</h2>
                <p id="overall-status">Kamu punya 0 tugas hari ini</p>
            </div>
            <div class="profile-pic"><i class="fas fa-smile-beam"></i></div>
        </header>

        <div class="category-grid">
            <div class="cat-card personal" onclick="openTasks('Personal')">
                <i class="fas fa-user icon"></i>
                <h3>Personal</h3>
                <span id="count-Personal">0 Tugas</span>
            </div>
            <div class="cat-card work" onclick="openTasks('Work')">
                <i class="fas fa-briefcase icon"></i>
                <h3>Work</h3>
                <span id="count-Work">0 Tugas</span>
            </div>
            <div class="cat-card education" onclick="openTasks('Education')">
                <i class="fas fa-graduation-cap icon"></i>
                <h3>Education</h3>
                <span id="count-Education">0 Tugas</span>
            </div>
            <div class="cat-card finance" onclick="openTasks('Finance')">
                <i class="fas fa-wallet icon"></i>
                <h3>Finance</h3>
                <span id="count-Finance">0 Tugas</span>
            </div>
            <div class="cat-card shopping" onclick="openTasks('Shopping')">
                <i class="fas fa-shopping-basket icon"></i>
                <h3>Shopping</h3>
                <span id="count-Shopping">0 Tugas</span>
            </div>
        </div>
    </div>

    <div id="list-screen" class="app-container hidden">
        <div class="list-header" id="dynamic-header">
            <button class="btn-icon" onclick="backToDashboard()"><i class="fas fa-chevron-left"></i></button>
            <h2 id="category-title">Kategori</h2>
        </div>

        <div class="task-input-section">
            <input type="text" id="new-task-input" placeholder="Tulis tugas baru...">
            <button onclick="addTask()"><i class="fas fa-plus"></i></button>
        </div>

        <ul id="task-list">
            </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
